---
- name: Check Free Filesystem Space
  hosts: all
  tasks:
    - name: Get mount info for / (root filesystem)
      ansible.builtin.set_fact:
        root_mount: "{{ ansible_mounts | selectattr('mount', 'equalto', '/') | list | first }}"

    - name: Assert free space on root filesystem (e.g., > 5GB)
      ansible.builtin.assert:
        that:
          - root_mount.size_available > 5 * 1024 * 1024 * 1024 # 5GB in bytes
        fail_msg: "Root filesystem has less than 5GB free!"
        success_msg: "Root filesystem has sufficient free space."

    - name: Debug available space
      ansible.builtin.debug:
        msg: "Root free space: {{ root_mount.size_available | human_readable }}"
